syntax = "proto3";

message GetVersionRequest {
}

message VersionInfo {
  string dir_name = 1;
  string build_tag = 2;
  string version_name = 3;
}

message GetVersionsResponse {
  repeated VersionInfo versions = 1;
}

message UpdateRequest {
  string selected_version = 1;
}

message UpdateResponse {
  bool success = 1;
  string message = 2;
}

service UpdaterApp {
  rpc GetAvailableVersions (GetVersionRequest) returns (GetVersionsResponse);
  rpc PerformUpdate (UpdateRequest) returns (UpdateResponse);
}