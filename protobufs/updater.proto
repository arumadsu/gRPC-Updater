syntax = "proto3";
import "google/protobuf/empty.proto";

message VersionInfo {
  string dir_name = 1;
  string build_tag = 2;
  string version_name = 3;
}

message GetVersionsResponse {
  repeated VersionInfo versions = 1;
}

service UpdaterApp {
  rpc GetAvailableVersions (google.protobuf.Empty) returns (GetVersionsResponse);
}